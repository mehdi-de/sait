{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <link rel="shortcut icon" href="{% static 'image/logoo.png' %}" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام</title>

<style>

        :root {
            --bg-primary: #0a0a1f;
            --bg-gradient: radial-gradient(ellipse at center, #0a0a1f 0%, #000 70%);
            --glass-bg: rgba(156,39,176,0.18);
            --border-glass: rgba(255,255,255,0.2);
            --text-primary: #fff;
            --text-secondary: rgba(255,255,255,0.92);
            --accent-primary: #9c27b0;
            --accent-secondary: #e91e63;
            --accent-glow: #ff5722;
            --error-bg: rgba(244,67,54,0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Vazir', Arial, sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            position: relative;
            overflow-x: hidden;
        }

        .nebula-bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.2) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.15) 0%, transparent 50%);
            z-index: 1;
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 8px; height: 8px;
            background: radial-gradient(circle, var(--accent-primary), transparent);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .particle:nth-child(2) { 
            width: 12px; height: 12px; 
            top: 60%; right: 15%; 
            animation-delay: 5s; 
        }
        .particle:nth-child(3) { 
            width: 6px; height: 6px; 
            top: 80%; left: 70%; 
            animation-delay: 8s; 
        }
        .particle:nth-child(4) { 
            width: 10px; height: 10px; 
            top: 30%; right: 60%; 
            animation-delay: 12s; 
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            10%, 90% { opacity: 1; }
        }

        /* 🔥 لوگو - بالاتر و جدا از فرم */
        .neon-title {
            position: fixed; /* تغییر از absolute به fixed */
            top: 25px; /* بالاتر */
            left: 50%;
            transform: translateX(-50%);
            z-index: 40; /* بالاتر */
            font-size: clamp(1.8rem, 5vw, 3.5rem); /* کمی بزرگ‌تر */
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--accent-glow));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 8s ease infinite;
            filter: drop-shadow(0 0 25px rgba(156,39,176,0.7));
            text-decoration: none;
        }

        @keyframes gradientFlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* فرم - فاصله بیشتر از بالا */
        .register-container {
            position: relative;
            z-index: 25;
            max-width: 480px;
            width: 90%;
            margin: 180px auto 50px; /* 180px فاصله از بالا ✅ */
            padding: 40px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid var(--border-glass);
            box-shadow: 
                0 30px 80px rgba(0,0,0,0.8),
                0 0 40px rgba(156,39,176,0.3);
            color: var(--text-primary);
            text-align: center;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .register-container::before {
            content: '';
            position: absolute;
            inset: 0;
            margin: auto;
            width: 280px; height: 280px;
            border: 1px solid var(--border-glass);
            border-radius: 50%;
            animation: rotateRing 12s linear infinite;
        }

        .register-container > * { position: relative; z-index: 2; }

        @keyframes rotateRing {
            to { transform: rotate(360deg); }
        }

        .register-container h2 {
            font-size: clamp(1.8rem, 4vw, 2.3rem);
            margin-bottom: 28px;
            background: linear-gradient(45deg, var(--text-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-field {
            margin-bottom: 20px;
        }

        .form-field label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-field input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-glass);
            border-radius: 18px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-field input:focus {
            border-color: var(--accent-secondary);
            box-shadow: 0 0 20px rgba(233,30,99,0.4);
            outline: none;
        }

        .form-field input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .register-container button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--accent-glow));
            border: none;
            border-radius: 22px;
            color: var(--text-primary);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            margin-top: 10px;
            transition: all 0.4s ease;
            box-shadow: 0 12px 30px rgba(156,39,176,0.4);
            position: relative;
            overflow: hidden;
        }

        .register-container button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(156,39,176,0.6);
        }

        .login-link {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border-glass);
        }

        .login-link p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .login-link a {
            color: var(--accent-glow);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #ffd93d;
            text-shadow: 0 0 15px rgba(255,217,61,0.7);
        }

        .errorlist {
            background: var(--error-bg);
            border: 1px solid rgba(244,67,54,0.4);
            color: #ffcccb;
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0 20px;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* موبایل */
        @media (max-width: 768px) {
            .neon-title { 
                top: 15px; 
                font-size: clamp(1.4rem, 7vw, 2.2rem);
            }
            .register-container {
                margin: 100px auto 30px; /* کمتر در موبایل */
                width: 95%;
                padding: 30px 25px;
            }
        }

        @media (max-width: 480px) {
            .register-container { 
                margin: 80px auto 20px; 
                padding: 25px 20px; 
            }
        }
    </style>
</head>
<body>
    <div class="nebula-bg"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <a href="{% url 'home' %}" class="neon-title">AR TEST</a>

    <div class="register-container">
        <h2>💜 ستاره جدید بسازید</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-field">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <div class="errorlist">
                        {% for error in field.errors %}
                            {{ error }}
                        {% endfor %}
                    </div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit">🌟 ثبت‌نام در کهکشان</button>
        </form>
        <div class="login-link">
            <p>از قبل ستاره دارید؟ <a href="{% url 'accounts:login' %}">ورود کنید 🔥</a></p>
        </div>
    </div>
</body>
</html>
