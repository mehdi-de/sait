<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام کهکشانی | AR TEST</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Vazir', Arial, sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #0a0a1f 0%, #000 70%);
            position: relative;
            overflow-x: hidden;
        }

        /* 🌌 پس‌زمینه */
        .nebula-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.4) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120,219,255,0.2) 0%, transparent 50%);
        }

        /* ⭐ ذرات */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2; /* بالاتر */
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, #9c27b0, transparent);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }

        .particle:nth-child(1) { width: 8px; height: 8px; top: 10%; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 12px; height: 12px; top: 60%; right: 15%; animation-delay: 5s; }
        .particle:nth-child(3) { width: 6px; height: 6px; top: 80%; left: 70%; animation-delay: 8s; }
        .particle:nth-child(4) { width: 10px; height: 10px; top: 30%; right: 60%; animation-delay: 12s; }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
        }

        /* 🔥 لوگو - z-index بالاتر + بالاتر */
        .neon-title {
            position: absolute;
            top: 15px; /* بالاتر */
            left: 50%;
            transform: translateX(-50%);
            z-index: 30; /* خیلی بالاتر ✅ */
            font-size: clamp(1.6rem, 5vw, 3.2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #9c27b0, #e91e63, #ff5722);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 8s ease infinite;
            filter: drop-shadow(0 0 20px rgba(156,39,176,0.8));
            text-decoration: none; /* لینک بدون زیرخط */
            display: block;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* کانتینر */
        .register-container {
            position: relative;
            z-index: 25; /* کمتر از لوگو */
            max-width: 480px;
            width: 90%;
            margin: 120px auto 50px; /* فاصله بیشتر از بالا */
            padding: 40px 30px;
            background: rgba(156,39,176,0.18);
            backdrop-filter: blur(25px);
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 
                0 30px 80px rgba(0,0,0,0.85),
                0 0 50px rgba(156,39,176,0.4);
            color: #fff;
            text-align: center;
            animation: slideUp 1.5s ease-out;
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* حلقه */
        .register-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 280px;
            height: 280px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: rotateRing 12s linear infinite;
            z-index: 0;
        }

        .register-container > * {
            position: relative;
            z-index: 2;
        }

        @keyframes rotateRing {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .register-container h2 {
            font-size: clamp(1.8rem, 4vw, 2.3rem);
            margin-bottom: 28px;
            background: linear-gradient(45deg, #fff, #e91e63);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* فیلدها */
        .form-field {
            margin-bottom: 20px;
        }

        .form-field label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.92);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-field input {
            width: 100% !important;
            padding: 16px 20px;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 18px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            color: #fff;
            font-size: 1rem;
            transition: all 0.4s ease;
            font-family: inherit;
        }

        .form-field input:focus {
            border-color: #e91e63;
            box-shadow: 0 0 25px rgba(233,30,99,0.5);
            transform: translateY(-2px);
            outline: none;
        }

        .form-field input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        /* دکمه */
        .register-container button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #9c27b0, #e91e63, #ff5722);
            border: none;
            border-radius: 22px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(156,39,176,0.5);
            font-family: inherit;
            margin-top: 10px;
        }

        .register-container button:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 50px rgba(156,39,176,0.7);
        }

        /* لینک */
        .login-link {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .login-link p {
            color: rgba(255,255,255,0.9);
            font-size: 1rem;
        }

        .login-link a {
            color: #ff5722;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.4s ease;
        }

        .login-link a:hover {
            color: #ffd93d;
            text-shadow: 0 0 20px rgba(255,217,61,0.8);
        }

        /* خطاها */
        .errorlist {
            background: rgba(244,67,54,0.25);
            border: 1px solid rgba(244,67,54,0.5);
            color: #ffcccb;
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0 20px 0;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* موبایل */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 10px 0;
            }
            
            .neon-title {
                top: 10px; /* بالاتر در موبایل ✅ */
                font-size: clamp(1.4rem, 7vw, 2.2rem);
            }
            
            .register-container {
                margin: 60px auto 30px !important;
                max-width: 95%;
                width: 95%;
                padding: 35px 25px;
            }
            
            .form-field input {
                padding: 15px 18px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 30px 20px;
                margin: 50px auto 20px;
            }
        }
    </style>
</head>
<body>
    <!-- پس‌زمینه -->
    <div class="nebula-bg"></div>
    
    <!-- ذرات -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- لوگو - z-index 30 -->
    <a href="{% url 'home' %}" class="neon-title">AR TEST</a>

    <!-- فرم - z-index 25 -->
    <div class="register-container">
        <h2>💜 ستاره جدید بسازید</h2>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-field">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <div class="errorlist">
                        {% for error in field.errors %}
                            {{ error }}
                        {% endfor %}
                    </div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit">🌟 ثبت‌نام در کهکشان</button>
        </form>

        <div class="login-link">
            <p>از قبل ستاره دارید؟ <a href="{% url 'accounts:login' %}">ورود کنید 🔥</a></p>
        </div>
    </div>
</body>
</html>
