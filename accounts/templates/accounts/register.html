<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام</title>

    <style>

        /* عنوان نئونی */
        .neon-title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            text-align: center;
            font-size: 4rem;
            font-weight: bold;
            color: #7f9cff;
            font-family: 'Arial', sans-serif;

            text-shadow:
                0 0 8px #8da2ff,
                0 0 15px #8da2ff,
                0 0 25px #6c7bff,
                0 0 40px #3f48ff,
                0 0 70px #2f37ff;

            animation: neonFlicker 4s infinite;
        }

        @keyframes neonFlicker {
            0%, 13%, 16%, 18%, 22%, 25%, 28%, 100% {
                opacity: 1;
                text-shadow:
                    0 0 8px #8da2ff,
                    0 0 15px #8da2ff,
                    0 0 25px #6c7bff,
                    0 0 40px #3f48ff,
                    0 0 70px #2f37ff;
            }

            14%, 17% {
                opacity: 0.3;
                text-shadow: none;
            }

            26% {
                opacity: 0.1;
                text-shadow: 0 0 2px #3f48ff;
            }

            27% {
                opacity: 0.7;
                text-shadow:
                    0 0 5px #7f9cff,
                    0 0 10px #8da2ff;
            }
        }

        /* صفحه اصلی */
        body {
            margin: 0;
            background-color: #000;
            font-family: 'Arial', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* پس‌زمینه ستاره‌ای */
        .stars-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;

            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                        radial-gradient(circle, rgba(255, 255, 255, 0.1) 2px, transparent 2px),
                        radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                        radial-gradient(circle, rgba(255, 255, 255, 0.1) 2px, transparent 2px);
            background-size: 50px 50px, 100px 100px, 70px 70px, 120px 120px;

            animation: moveStars 60s linear infinite;
        }

        .stars-background::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;

            background: radial-gradient(ellipse at top left, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                        radial-gradient(ellipse at bottom right, rgba(255, 255, 255, 0.05) 2px, transparent 2px);

            background-size: 80px 80px, 150px 150px;
            animation: twinkleStars 30s linear infinite;
        }

        @keyframes moveStars {
            0% { background-position: 0 0; }
            100% { background-position: 1000px 1000px; }
        }

        @keyframes twinkleStars {
            0% { background-position: 500px 200px; }
            100% { background-position: 0 0; }
        }

        /* کانتینر وسط صفحه */
        .register-container {
            position: relative;
            z-index: 3;

            width: 400px;
            padding: 30px;
            background: rgba(10, 10, 30, 0.6);

            border-radius: 15px;
            text-align: center;

            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.7),
                0 0 20px rgba(130, 130, 255, 0.4);
        }

        .register-container h2 {
            margin-bottom: 20px;
            color: #a0a0ff;
            font-size: 2em;
            text-shadow: 0 0 10px rgba(130, 130, 255, 0.7);
        }

        /* فرم */
        .form-field {
            margin-bottom: 15px;
            text-align: right;
        }

        .form-field label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
            font-weight: bold;
        }

        .form-field input {
            width: calc(100% - 20px);
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);

            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            color: white;

            transition: 0.3s;
        }

        .form-field input:focus {
            border-color: #a0a0ff;
            box-shadow: 0 0 15px rgba(130, 130, 255, 0.5);
        }

        /* دکمه */
        .register-container button {
            width: 100%;
            padding: 12px;

            background: linear-gradient(to right, #4e54c8, #8f94fb);
            border: none;
            border-radius: 5px;
            color: white;

            font-size: 1.1em;
            font-weight: bold;

            cursor: pointer;
            transition: 0.3s;
        }

        .register-container button:hover {
            background: linear-gradient(to right, #8f94fb, #4e54c8);
            box-shadow: 0 0 20px rgba(130, 130, 255, 0.7);
        }

        /* لینک ورود */
        .login-link {
            margin-top: 20px;
            font-size: .9em;

        }

        .login-link p { /* این قسمت رو اضافه کن */
            color: #ffffff;
        }

        .login-link a {
            color: #a0a0ff;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            color: #fff;
        }

    </style>
</head>

<body>
    <div class="logo">
        <a href="{% url 'home' %}">
            <h1 class="neon-title">AR TEST</h1>
        </a>
    </div>

    <div class="stars-background"></div>

    <div class="register-container">

        <h2>ثبت‌نام</h2>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-field">
                {{ field.label_tag }}
                {{ field }}

                {% if field.errors %}
                <div class="errorlist">
                    {% for error in field.errors %}
                    <p>{{ error }}</p>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit">ثبت‌نام</button>
        </form>

        <div class="login-link">
            <p>قبلاً ثبت‌نام کرده‌اید؟ <a href="{% url 'accounts:login' %}">ورود</a></p>
        </div>
    </div>

</body>
</html>
