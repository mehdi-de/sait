<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود کهکشانی | AR TEST</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        height: 100vh;
        overflow: hidden;
        background: #0a0a23;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    /* ستاره‌های چشمک‌زن */
    .stars {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
    }

    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        animation: twinkle 3s infinite ease-in-out;
        box-shadow: 0 0 6px rgba(255,255,255,0.8);
    }

    .star:nth-child(1) { width: 2px; height: 2px; top: 20%; left: 10%; animation-delay: 0s; }
    .star:nth-child(2) { width: 3px; height: 3px; top: 50%; left: 20%; animation-delay: 1s; }
    .star:nth-child(3) { width: 1px; height: 1px; top: 70%; left: 80%; animation-delay: 2s; }
    .star:nth-child(4) { width: 2px; height: 2px; top: 30%; right: 15%; animation-delay: 0.5s; }
    .star:nth-child(5) { width: 4px; height: 4px; top: 80%; left: 60%; animation-delay: 1.5s; }

    @keyframes twinkle {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.5); }
    }

    /* لوگو نئونی - بالای صفحه */
    .logo {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
    }

    .neon-title {
        font-size: clamp(1.8rem, 5vw, 3rem);
        font-weight: 900;
        background: linear-gradient(45deg, #00d4ff, #7f9cff, #ff6b9d);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 20px rgba(0,212,255,0.8);
        animation: neonGlow 3s ease-in-out infinite alternate;
        text-align: center;
    }

    @keyframes neonGlow {
        from { filter: drop-shadow(0 0 10px rgba(0,212,255,0.5)); }
        to { filter: drop-shadow(0 0 25px rgba(255,107,157,0.8)); }
    }

    /* کانتینر ورود */
    .login-container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 25px;
        padding: 40px 30px;
        max-width: 420px;
        width: 100%;
        color: #fff;
        text-align: center;
        box-shadow: 
            0 25px 60px rgba(0, 0, 0, 0.7),
            0 0 40px rgba(0, 212, 255, 0.3);
        z-index: 20;
        position: relative;
    }

    .login-container h2 {
        font-size: 2rem;
        margin-bottom: 30px;
        background: linear-gradient(45deg, #fff, #a0a0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* فیلدهای ورودی */
    .login-container input {
        width: 100%;
        padding: 15px 20px;
        margin-bottom: 20px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 1rem;
        transition: all 0.4s ease;
        backdrop-filter: blur(10px);
    }

    .login-container input:focus {
        border-color: #00d4ff;
        box-shadow: 0 0 25px rgba(0, 212, 255, 0.6);
        outline: none;
        transform: scale(1.02);
    }

    .login-container input::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    /* دکمه */
    .login-container button {
        width: 100%;
        padding: 18px;
        background: linear-gradient(45deg, #00d4ff, #0099cc);
        border: none;
        border-radius: 15px;
        color: #fff;
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.4s ease;
        box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
    }

    .login-container button:hover {
        transform: translateY(-3px);
        box-shadow: 0 20px 40px rgba(0, 212, 255, 0.6);
    }

    /* لینک ثبت‌نام */
    .register-link {
        margin-top: 25px;
    }

    .register-link a {
        color: #ff6b9d;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.3s ease;
    }

    .register-link a:hover {
        color: #ffd93d;
        text-shadow: 0 0 15px rgba(255, 217, 61, 0.8);
    }

    /* پیام خطا */
    .error {
        background: rgba(255, 60, 60, 0.15);
        border: 1px solid rgba(255, 60, 60, 0.5);
        color: #ffaaaa;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 20px;
        animation: shake 0.5s ease-in-out;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }

    /* موبایل */
    @media (max-width: 480px) {
        body {
            padding: 10px;
        }
        
        .login-container {
            padding: 30px 20px;
            margin: 0;
        }
        
        .logo {
            top: 20px;
        }
    }
</style>

</head>
<body>
    <!-- ستاره‌های چشمک‌زن -->
    <div class="stars">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <!-- لوگو -->
    <div class="logo">
        <a href="{% url 'home' %}" class="neon-title">AR TEST</a>
    </div>

    <!-- فرم ورود -->
    <div class="login-container">
        <h2>🌌 ورود به کهکشان هنر</h2>

        {% if form.errors %}
            <div class="error">
                🚨 نام کاربری یا رمز عبور اشتباه است!
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="👤 نام کاربری یا ایمیل" required autofocus>
            <input type="password" name="password" placeholder="🔒 رمز عبور" required>
            <button type="submit">🚀 پرتاب به داشبورد</button>
        </form>

        <div class="register-link">
            <p>ستاره جدید؟ <a href="{% url 'accounts:register' %}">ثبت‌نام کنید ✨</a></p>
        </div>
    </div>
</body>
</html>
