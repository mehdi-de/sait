    <!-- quizzes/templates/quizzes/question_detail.html -->
    <!DOCTYPE html>

    <html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>سوال آزمون</title>
        <!-- اینجا می‌توانید لینک به فایل‌های CSS یا Bootstrap را اضافه کنید -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
        /* 🔥 استایل‌های فوق حرفه‌ای - فقط برای کلاس‌های موجود 🔥 */
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Vazir', Tahoma, sans-serif;
            min-height: 100vh;
            padding: 20px 0;
        }

        .container {
            padding: 20px;
            max-width: 850px;
        }

        /* 🔥 کارت سوال */
        .question-card {
            border: none !important;
            border-radius: 25px !important;
            box-shadow: 
                0 25px 60px rgba(0,0,0,0.3),
                0 0 0 1px rgba(255,255,255,0.2) !important;
            background: rgba(255,255,255,0.12) !important;
            backdrop-filter: blur(25px) !important;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            margin-bottom: 40px;
        }

        .question-card:hover {
            transform: translateY(-10px);
            box-shadow: 
                0 35px 80px rgba(30,60,114,0.5),
                0 0 0 1px rgba(0,123,255,0.5) !important;
        }

        /* 🔥 هدر */
        .question-header {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 50%, #004085 100%) !important;
            color: white !important;
            padding: 30px !important;
            border-radius: 25px 25px 0 0 !important;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .question-header::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            border-radius: 2px;
        }

        .question-header h3 {
            margin: 0 !important;
            font-size: 1.8rem !important;
            font-weight: 800 !important;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* 🔥 شمارنده */
        .question-counter {
            background: rgba(255,255,255,0.2) !important;
            border-radius: 50px !important;
            padding: 12px 25px !important;
            color: white !important;
            font-weight: 600 !important;
            font-size: 1.1rem !important;
            margin-bottom: 30px !important;
            display: inline-block;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        /* 🔥 بدنه */
        .question-body {
            padding: 50px 40px !important;
            text-align: center !important;
        }

        .question-body h5 {
            color: #f8f9fa !important;
            font-size: 1.5rem !important;
            font-weight: 600 !important;
            margin-bottom: 30px !important;
            line-height: 1.7;
            padding: 25px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            border-right: 5px solid #007bff;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.2);
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            margin: 40px 0;
            border-radius: 2px;
        }

        /* 🔥 گزینه‌ها */
        .answer-option {
            margin-bottom: 0 !important;
            background: rgba(255,255,255,0.08) !important;
            border-radius: 18px !important;
            padding: 25px 30px !important;
            margin-bottom: 20px !important;
            border: 2px solid transparent !important;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1) !important;
            cursor: pointer !important;
        }

        .answer-option:hover {
            border-color: #007bff !important;
            transform: translateY(-5px) !important;
            box-shadow: 0 20px 40px rgba(0,123,255,0.25) !important;
        }

        .form-check-input {
            width: 22px !important;
            height: 22px !important;
            margin-left: 0 !important;
            accent-color: #007bff !important;
            transform: scale(1.2);
            filter: drop-shadow(0 2px 5px rgba(0,123,255,0.5));
        }

        .form-check-label {
            font-size: 1.2rem !important;
            color: #f8f9fa !important;
            font-weight: 500 !important;
            cursor: pointer !important;
            padding-right: 20px;
            transition: all 0.3s ease;
        }

        .form-check-input:checked + .form-check-label {
            color: #007bff !important;
            font-weight: 700 !important;
        }

        /* 🔥 دکمه */
        button[type="submit"] {
            background: linear-gradient(45deg, #28a745, #20c997) !important;
            border: none !important;
            color: white !important;
            padding: 20px 50px !important;
            font-size: 1.3rem !important;
            font-weight: 800 !important;
            border-radius: 50px !important;
            cursor: pointer !important;
            width: 100% !important;
            transition: all 0.4s ease !important;
            box-shadow: 0 15px 35px rgba(40,167,69,0.4) !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            margin-top: 30px;
        }

        button[type="submit"]:hover {
            transform: translateY(-5px) !important;
            box-shadow: 0 25px 50px rgba(40,167,69,0.6) !important;
            background: linear-gradient(45deg, #20c997, #28a745) !important;
        }

        button[type="submit"]:active {
            transform: translateY(-2px) !important;
        }

        /* 🔥 Responsive */
        @media (max-width: 768px) {
            .question-body { padding: 30px 20px !important; }
            .question-header { padding: 25px 20px !important; }
            .question-header h3 { font-size: 1.4rem !important; }
            .form-check-label { font-size: 1.1rem !important; }
            button[type="submit"] { padding: 18px 30px !important; font-size: 1.1rem !important; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-card { animation: fadeInUp 0.8s ease-out; }
    </style>
    </head>
    <body>
        <div class="container">
            <div class="card question-card">
                <div class="question-header">
                    <h3>{{ quiz.title }}</h3>
                </div>
                <div class="card-body question-body">
                    <div class="question-counter">سوال {{ current_question_index }} از {{ total_questions }}</div>
                    
                    <h5>{{ question.text }}</h5>
                    
                    <hr>

                    <form method="post" action="{% url 'quiz_question' quiz.id %}"> 
                     {% csrf_token %}
    
                     {% for choice in question.choices.all %}
                      <div class="answer-option form-check">
                         <input class="form-check-input" type="radio" name="choice" id="choice{{ choice.id }}" value="{{ choice.id }}" required>
                          <label class="form-check-label" for="choice{{ choice.id }}">
                                {{ choice.choice_text }}
                          </label>
                     </div>
                     {% endfor %}
    
                     <button type="submit">ثبت پاسخ و رفتن به سوال بعدی</button>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
    </html>
