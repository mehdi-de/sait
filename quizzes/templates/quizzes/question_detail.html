    <!-- quizzes/templates/quizzes/question_detail.html -->
    <!DOCTYPE html>

    <html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>سوال آزمون</title>
        <!-- اینجا می‌توانید لینک به فایل‌های CSS یا Bootstrap را اضافه کنید -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body { padding-top: 20px; background-color: #f8f9fa; }
            .question-card { border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            .question-header { background-color: #007bff; color: white; padding: 15px; border-radius: 5px 5px 0 0; }
            .question-body { padding: 25px; }
            .answer-option { margin-bottom: 15px; }
            .answer-option label { cursor: pointer; }
            .btn-custom-next { background-color: #28a745; color: white; }
            .btn-custom-next:hover { background-color: #218838; }
            .question-counter { font-size: 0.9em; color: #6c757d; margin-bottom: 20px; }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="card question-card">
                <div class="question-header">
                    <h3>{{ quiz.title }}</h3>
                </div>
                <div class="card-body question-body">
                    <div class="question-counter">سوال {{ current_question_index }} از {{ total_questions }}</div>
                    
                    <h5>{{ question.text }}</h5>
                    
                    <hr>

                    <form method="post" action="{% url 'quiz_question' quiz.id %}"> 
                     {% csrf_token %}
    
                     {% for choice in question.choices.all %}
                      <div class="answer-option form-check">
                         <input class="form-check-input" type="radio" name="choice" id="choice{{ choice.id }}" value="{{ choice.id }}" required>
                          <label class="form-check-label" for="choice{{ choice.id }}">
                                {{ choice.choice_text }}
                          </label>
                     </div>
                     {% endfor %}
    
                     <button type="submit">ثبت پاسخ و رفتن به سوال بعدی</button>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
    </html>
