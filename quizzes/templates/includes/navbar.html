{% load static %}

<style>

    
/* 🔥 Navbar Styles */
.navbar {
    background: linear-gradient(135deg, rgba(20, 25, 45, 0.98) 0%, rgba(35, 40, 70, 0.98) 100%);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(100, 150, 255, 0.2);
    border-bottom: 2px solid transparent;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 10000;
    padding: 1rem 0;
    transition: all 0.4s ease;
}

.navbar.scrolled {
    border-bottom-color: #00f0ff;
    box-shadow: 0 10px 40px rgba(0, 240, 255, 0.3);
}

.navbar-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 70px;
}

.site-identity a {
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(45deg, #ff03ab, #00d4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-decoration: none;
    transition: all 0.3s ease;
}

.site-identity a:hover {
    filter: drop-shadow(0 0 20px rgb(199, 232, 18));
}

.nav-links {
    display: flex;
    list-style: none;
    gap: 15px;
    align-items: center;
}

.nav-link {
    color: #e0e0e0;
    padding: 12px 24px;
    border-radius: 15px;
    font-weight: 600;
    font-size: 15px;
    position: relative;
    transition: all 0.3s ease;
    text-decoration: none;
}

.nav-link::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 3px;
    background: linear-gradient(45deg, #00f0ff, #00d4ff);
    transition: all 0.3s ease;
    transform: translateX(-50%);
    border-radius: 2px;
}

.nav-link:hover::before,
.nav-link.active::before {
    width: 90%;
}

.nav-link:hover {
    color: #fff;
    background: rgba(0, 240, 255, 0.15);
    box-shadow: 0 5px 20px rgba(0, 240, 255, 0.3);
}

.nav-link.active {
    color: #00f0ff;
    background: rgba(0, 240, 255, 0.2);
}

.auth-controls {
    display: flex;
    gap: 15px;
    align-items: center;
}

.btn-neon {
    padding: 12px 28px;
    border: 2px solid transparent;
    border-radius: 50px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(15px);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Vazir', sans-serif;
}

.btn-primary {
    background: linear-gradient(45deg, #00f0ff, #00d4ff);
    color: #000;
    box-shadow: 0 8px 25px rgba(0, 240, 255, 0.4);
}

.btn-primary:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 45px rgba(0, 240, 255, 0.6);
    border-color: rgba(255, 255, 255, 0.3);
}

.btn-secondary {
    background: linear-gradient(45deg, #ff0080, #ff4d94);
    color: #000;
    box-shadow: 0 8px 25px rgba(255, 0, 128, 0.4);
}

.btn-secondary:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 45px rgba(255, 0, 128, 0.6);
}

.btn-danger {
    background: linear-gradient(45deg, #ff416c, #ff4b2b);
    color: white;
    box-shadow: 0 8px 25px rgba(255, 71, 107, 0.4);
}

.btn-danger:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 45px rgba(255, 71, 107, 0.6);
}

/* 🔥 Mobile */
.menu-toggle {
    display: none;
    flex-direction: column;
    cursor: pointer;
    gap: 5px;
    padding: 10px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
}

.hamburger {
    width: 28px;
    height: 3px;
    background: linear-gradient(45deg, #00f0ff, #00d4ff);
    border-radius: 3px;
    transition: all 0.3s ease;
    transform-origin: center;
}

.menu-toggle.active .hamburger:nth-child(1) {
    transform: rotate(45deg) translate(7px, 7px);
}

.menu-toggle.active .hamburger:nth-child(2) {
    opacity: 0;
}

.menu-toggle.active .hamburger:nth-child(3) {
    transform: rotate(-45deg) translate(7px, -7px);
}

@media (max-width: 1024px) {
    .nav-links {
        position: fixed;
        top: 100%;
        left: 0;
        width: 100%;
        background: rgba(10, 10, 10, 0.98);
        flex-direction: column;
        padding: 30px 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
        backdrop-filter: blur(30px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .nav-links.active {
        max-height: 600px;
    }

    .nav-link {
        padding: 25px 50px;
        width: 100%;
        text-align: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0;
    }

    .menu-toggle {
        display: flex;
    }

    .auth-controls {
        margin-left: auto;
    }
}

@media (max-width: 768px) {
    .navbar-container {
        height: 50px;
        padding: 0 20px;
    }
    
    .site-identity a {
        font-size: 1.7rem;
    }
    
    .btn-neon {
        padding: 12px 22px;
        font-size: 13px;
    }
}
.menu-toggle {
    display: none; /* موبایل نشون میده */
    flex-direction: column;
    cursor: pointer;
    padding: 4px;
}

.hamburger {
    width: 25px;
    height: 3px;
    background: #fff;
    margin: 3px 0;
    transition: 0.3s;
    border-radius: 3px;
}

/* موبایل */
@media (max-width: 768px) {
    .menu-toggle { display: flex; }
    
    .nav-links {
        position: fixed;
        top: 70px; right: -100%;
        width: 80%;
        height: calc(100vh - 70px);
        background: linear-gradient(135deg, #9dea66 30%, #ff0de7 100%);
        backdrop-filter: blur(10px);
        flex-direction: column;
        padding: 2rem 0;
        transition: 0.4s ease-in-out;
        box-shadow: -10px 0 30px rgba(0,0,0,0.3);
        z-index: 1000;
    }
    
    .nav-links.active {
        right: 0; /* باز میشه */
    }
    
    .nav-link {
        font-size: 1.3rem;
        padding: 1rem 2rem;
        color: white;
        text-align: center;
        border-bottom: 1px solid rgba(235, 8, 8, 0.1);
        opacity: 0;
        transform: translateX(30px);
        transition: 0.3s ease;
    }
    
    .nav-links.active .nav-link {
        opacity: 1;
        transform: translateX(0);
    }
    
    /* انیمیشن همبرگر */
    .menu-toggle.active .hamburger:nth-child(1) {
        transform: rotate(-45deg) translate(-5px, 6px);
    }
    .menu-toggle.active .hamburger:nth-child(2) {
        opacity: 0;
    }
    .menu-toggle.active .hamburger:nth-child(3) {
        transform: rotate(45deg) translate(-5px, -6px);
    }
}
</style>

<nav class="navbar" id="navbar">
    <div class="navbar-container">
        <!-- 🔥 Logo -->
        <div class="site-identity">
            <a href="{% url 'home' %}">🎯 AR TEST</a>
        </div>
        <!-- 🔥 Navigation -->
        <ul class="nav-links" id="navLinks">
            <li><a href="{% url 'home' %}" class="nav-link{% if request.resolver_match.url_name == 'home' %} active{% endif %}">🏠 خانه</a></li>
            {% if user.is_authenticated %}
                <li><a href="{% url 'accounts:dashboard' %}" class="nav-link{% if request.resolver_match.url_name == 'accounts:dashboard' %} active{% endif %}">📊 داشبورد</a></li>
                <li><a href="{% url 'subscribe' %}" class="nav-link{% if request.resolver_match.url_name == 'subscribe' %} active{% endif %}">💎 اشتراک</a></li>
                <li><a href="{% url 'accounts:leaderboard' %}" class="nav-link{% if request.resolver_match.url_name == 'accounts:leaderboard' %} active{% endif %}">🏆 رتبه‌بندی</a></li>
                <li><a href="{% url 'about' %}" class="nav-link{% if request.resolver_match.url_name == 'about' %} active{% endif %}">📃 درباره ما</a></li>
            {% endif %}
        </ul>
        <!-- 🔥 Auth Controls -->
        <div class="auth-controls">
            {% if not user.is_authenticated %}
                <a href="{% url 'accounts:login' %}" class="btn-neon btn-primary">🔐 ورود</a>
                <a href="{% url 'accounts:register' %}" class="btn-neon btn-secondary">📝 ثبت‌نام</a>
            {% else %}
                <form method="post" action="{% url 'accounts:logout' %}" style="display: inline-block;">
                    {% csrf_token %}
                    <button type="submit" class="btn-neon btn-danger">🚪 خروج</button>
                </form>
            {% endif %}
        </div>

        <!-- 🔥 Mobile Toggle -->
        <div class="menu-toggle" id="menuToggle">
            <span class="hamburger"></span>
            <span class="hamburger"></span>
            <span class="hamburger"></span>
        </div>
    </div>
</nav>


<script>
document.addEventListener('DOMContentLoaded', function() {
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    
    // باز/بست منو
    menuToggle.addEventListener('click', function() {
        menuToggle.classList.toggle('active');
        navLinks.classList.toggle('active');
    });
    
    // بستن با کلیک روی لینک
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
            menuToggle.classList.remove('active');
            navLinks.classList.remove('active');
        });
    });
    
    // بستن با کلیک بیرون منو
    document.addEventListener('click', function(e) {
        if (!navLinks.contains(e.target) && !menuToggle.contains(e.target)) {
            menuToggle.classList.remove('active');
            navLinks.classList.remove('active');
        }
    });
});
</script>
